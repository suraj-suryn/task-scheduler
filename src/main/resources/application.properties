spring.application.name=task-scheduler

# ----------------------
# SERVER CONFIG
# ----------------------
server.port=9090

# Thymeleaf
spring.thymeleaf.cache=false

# ----------------------
# H2 DATABASE CONFIGURATION (Persistent File Mode)
# ----------------------
spring.datasource.url=jdbc:h2:file:./data/tasksdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ----------------------
# JPA / HIBERNATE SETTINGS
# ----------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ----------------------
# H2 CONSOLE (FOR TESTING)
# ----------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----------------------
# APP BASE URL (used for email verification link)
# Change this when deploying to production
# ----------------------
app.base-url=http://localhost:9090

# ----------------------
# LOGGING
# ----------------------
logging.level.com.suraj.scheduler=INFO
logging.level.org.springframework.security=WARN

# ----------------------
# SPRINGDOC / SWAGGER
# ----------------------
springdoc.packagesToScan=com.suraj.scheduler.controller
springdoc.pathsToMatch=/api/**
springdoc.override-with-generic-response=false
springdoc.api-docs.enabled=true

