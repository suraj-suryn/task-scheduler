<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Categories', ~{::main-content})}"
      lang="en">
<head><title>Categories</title></head>
<body>
<th:block th:fragment="main-content">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Categories</h1>
      <p class="text-gray-500 text-sm mt-1">Organize your tasks with color-coded categories</p>
    </div>
  </div>

  <!-- Add Category form -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
    <h2 class="font-semibold text-gray-800 mb-4"><i class="fa-solid fa-tag text-indigo-500 mr-2"></i>Add Category</h2>
    <form th:action="@{/categories/save}" th:object="${category}" method="post" class="flex flex-wrap gap-4 items-end">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="flex-1 min-w-40">
        <label class="block text-xs font-semibold text-gray-600 mb-1">Category Name *</label>
        <input type="text" th:field="*{name}" placeholder="e.g. Development"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">Color</label>
        <input type="color" th:field="*{colorHex}" value="#6366f1"
               class="h-10 w-16 border border-gray-300 rounded-lg cursor-pointer p-1"/>
      </div>
      <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-5 py-2 rounded-lg text-sm transition">
        <i class="fa-solid fa-plus mr-1"></i>Add
      </button>
    </form>
  </div>

  <!-- Categories list -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-100">
      <h2 class="font-semibold text-gray-800 text-sm">Your Categories
        <span class="ml-2 bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-0.5 rounded-full"
              th:text="${#lists.size(categories)}">0</span>
      </h2>
    </div>
    <div th:if="${#lists.isEmpty(categories)}" class="text-center py-12 text-gray-400">
      <i class="fa-solid fa-tags text-3xl mb-2 block text-gray-200"></i>
      <p class="text-sm">No categories yet. Create one above!</p>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 p-5" th:unless="${#lists.isEmpty(categories)}">
      <div th:each="c : ${categories}" class="flex items-center justify-between bg-gray-50 rounded-xl px-4 py-3 border border-gray-100 hover:shadow-sm transition">
        <div class="flex items-center gap-3">
          <span class="w-4 h-4 rounded-full flex-shrink-0" th:style="'background:' + ${c.colorHex}"></span>
          <span class="font-medium text-gray-800 text-sm" th:text="${c.name}">Category</span>
        </div>
        <a th:href="@{/categories/delete/{id}(id=${c.id})}"
           onclick="return confirm('Delete this category?')"
           class="text-red-400 hover:text-red-600 transition ml-2" title="Delete">
          <i class="fa-solid fa-trash text-sm"></i>
        </a>
      </div>
    </div>
  </div>

</th:block>
</body>
</html>
