<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error — Task Scheduler</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl p-10 text-center max-w-md w-full">
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-5">
      <i class="fa-solid fa-triangle-exclamation text-red-500 text-2xl"></i>
    </div>
    <h1 class="text-xl font-bold text-gray-800 mb-2" th:text="${errorTitle != null ? errorTitle : 'Something went wrong'}">Error</h1>
    <p class="text-gray-500 text-sm mb-6" th:text="${errorMessage != null ? errorMessage : 'An unexpected error occurred. Please try again.'}">Error message</p>
    <a href="/dashboard" class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-6 py-2.5 rounded-lg transition">
      <i class="fa-solid fa-house"></i>Go Home
    </a>
  </div>
</body>
</html>
