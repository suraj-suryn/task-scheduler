<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout('My Tasks', ~{::main-content})}"
      lang="en">
<head><title>Tasks</title></head>
<body>
<th:block th:fragment="main-content">

  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">My Tasks</h1>
      <p class="text-gray-500 text-sm mt-1">Manage and track your work tasks</p>
    </div>
    <button onclick="document.getElementById('add-task-modal').classList.remove('hidden')"
            class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2.5 rounded-lg transition">
      <i class="fa-solid fa-plus"></i>Add Task
    </button>
  </div>

  <!-- Filter bar -->
  <form th:action="@{/tasks}" method="get" class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6 flex flex-wrap gap-3 items-end">
    <div class="flex-1 min-w-40">
      <label class="block text-xs font-medium text-gray-600 mb-1">Search</label>
      <div class="relative">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"><i class="fa-solid fa-magnifying-glass"></i></span>
        <input type="text" name="search" th:value="${search}" placeholder="Search tasks..."
               class="w-full pl-8 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
      </div>
    </div>
    <div class="min-w-36">
      <label class="block text-xs font-medium text-gray-600 mb-1">Status</label>
      <select name="status" class="w-full border border-gray-300 rounded-lg text-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <option value="">All Statuses</option>
        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                th:selected="${selectedStatus != null and selectedStatus == s}">Status</option>
      </select>
    </div>
    <div class="min-w-36">
      <label class="block text-xs font-medium text-gray-600 mb-1">Category</label>
      <select name="categoryId" class="w-full border border-gray-300 rounded-lg text-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <option value="">All Categories</option>
        <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                th:selected="${selectedCategoryId != null and selectedCategoryId == c.id}">Category</option>
      </select>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
        <i class="fa-solid fa-filter mr-1"></i>Filter
      </button>
      <a th:href="@{/tasks}" class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-medium px-4 py-2 rounded-lg transition">
        <i class="fa-solid fa-xmark"></i>
      </a>
    </div>
  </form>

  <!-- Task table -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
      <h2 class="font-semibold text-gray-800 text-sm">
        Task List
        <span class="ml-2 bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-0.5 rounded-full"
              th:text="${#lists.size(tasks)}">0</span>
      </h2>
    </div>

    <div th:if="${#lists.isEmpty(tasks)}" class="text-center py-16 text-gray-400">
      <i class="fa-solid fa-inbox text-4xl mb-3 block text-gray-200"></i>
      <p class="text-sm">No tasks found. <button onclick="document.getElementById('add-task-modal').classList.remove('hidden')" class="text-indigo-600 hover:underline font-medium">Create your first task</button></p>
    </div>

    <div class="overflow-x-auto" th:unless="${#lists.isEmpty(tasks)}">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
          <tr>
            <th class="px-5 py-3 text-left">Task</th>
            <th class="px-4 py-3 text-left">Category</th>
            <th class="px-4 py-3 text-left">Priority</th>
            <th class="px-4 py-3 text-left">Start</th>
            <th class="px-4 py-3 text-left">End</th>
            <th class="px-4 py-3 text-left">Recurrence</th>
            <th class="px-4 py-3 text-left">Status</th>
            <th class="px-4 py-3 text-left">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr th:each="t : ${tasks}" class="hover:bg-gray-50 transition">
            <td class="px-5 py-3">
              <p class="font-medium text-gray-800" th:text="${t.name}">Task Name</p>
              <p class="text-xs text-gray-400 truncate max-w-xs" th:if="${t.description}" th:text="${t.description}">Description</p>
              <p class="text-xs text-gray-300 mt-0.5" th:if="${t.dependencies}">Depends on: <span th:text="${t.dependencies}"></span></p>
            </td>
            <td class="px-4 py-3">
              <span th:if="${t.category != null}" class="inline-flex items-center gap-1.5 text-xs font-medium">
                <span class="w-2 h-2 rounded-full" th:style="'background:' + ${t.category.colorHex}"></span>
                <span th:text="${t.category.name}" class="text-gray-600">Category</span>
              </span>
              <span th:unless="${t.category != null}" class="text-gray-300 text-xs">Ś</span>
            </td>
            <td class="px-4 py-3">
              <span th:text="${t.priority}"
                    th:classappend="${t.priority >= 8 ? 'bg-red-100 text-red-700' : (t.priority >= 5 ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700')}"
                    class="inline-block px-2 py-0.5 rounded-full text-xs font-bold">1</span>
            </td>
            <td class="px-4 py-3 text-xs text-gray-500" th:text="${#temporals.format(t.startTime, 'dd MMM, HH:mm')}">-</td>
            <td class="px-4 py-3 text-xs text-gray-500" th:text="${#temporals.format(t.endTime, 'dd MMM, HH:mm')}">-</td>
            <td class="px-4 py-3">
              <span th:if="${t.recurrenceType != null and t.recurrenceType.name() != 'NONE'}"
                    class="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-medium"
                    th:text="${t.recurrenceType}">DAILY</span>
              <span th:unless="${t.recurrenceType != null and t.recurrenceType.name() != 'NONE'}" class="text-gray-300 text-xs">Ś</span>
            </td>
            <td class="px-4 py-3">
              <span th:classappend="'status-' + ${t.status}"
                    class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold"
                    th:text="${t.status}">PENDING</span>
            </td>
            <td class="px-4 py-3">
              <div class="flex items-center gap-2">
                <a th:href="@{/tasks/delete/{id}(id=${t.id})}"
                   onclick="return confirm('Delete this task?')"
                   class="text-red-400 hover:text-red-600 transition" title="Delete">
                  <i class="fa-solid fa-trash text-sm"></i>
                </a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Add Task Modal -->
  <div id="add-task-modal" class="hidden fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-screen overflow-y-auto">
      <div class="flex items-center justify-between px-6 py-4 border-b">
        <h3 class="font-semibold text-gray-800"><i class="fa-solid fa-plus-circle text-indigo-500 mr-2"></i>Add New Task</h3>
        <button onclick="document.getElementById('add-task-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
      </div>
      <form th:action="@{/tasks/save}" th:object="${task}" method="post" class="px-6 py-5 space-y-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Task Name *</label>
          <input type="text" th:field="*{name}" placeholder="e.g. Review project proposal"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
          <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Description</label>
          <textarea th:field="*{description}" rows="2" placeholder="Optional notes..."
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Priority * (1-10)</label>
            <input type="number" th:field="*{priority}" min="1" max="10"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
            <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></p>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Category</label>
            <select th:field="*{category.id}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
              <option value="">None</option>
              <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}">Category</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Start Time *</label>
            <input type="datetime-local" th:field="*{startTime}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
            <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}"></p>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">End Time *</label>
            <input type="datetime-local" th:field="*{endTime}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
            <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}"></p>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Recurrence</label>
            <select th:field="*{recurrenceType}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
              <option th:each="r : ${recurrenceTypes}" th:value="${r}" th:text="${r}">NONE</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Recurrence End Date</label>
            <input type="date" th:field="*{recurrenceEndDate}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Dependencies (comma-separated IDs)</label>
          <input type="text" th:field="*{dependencies}" placeholder="e.g. 1,2,3"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg text-sm transition">
            <i class="fa-solid fa-floppy-disk mr-2"></i>Save Task
          </button>
          <button type="button" onclick="document.getElementById('add-task-modal').classList.add('hidden')"
                  class="px-5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg text-sm transition">Cancel</button>
        </div>
      </form>
    </div>
  </div>

</th:block>
</body>
</html>
