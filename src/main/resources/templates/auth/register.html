<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Task Scheduler</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 to-indigo-100 flex items-center justify-center p-4">

<div class="w-full max-w-md">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl shadow-lg mb-4">
      <i class="fa-solid fa-calendar-check text-white text-2xl"></i>
    </div>
    <h1 class="text-2xl font-bold text-indigo-900">Task Scheduler</h1>
    <p class="text-gray-500 text-sm mt-1">Create your free account</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-xl p-8">
    <h2 class="text-xl font-semibold text-gray-800 mb-6">Create Account</h2>

    <!-- Email pending verification -->
    <div th:if="${param.pending}" class="text-center py-4">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-yellow-100 rounded-full mb-4">
        <i class="fa-solid fa-envelope text-yellow-600 text-2xl"></i>
      </div>
      <h3 class="font-semibold text-gray-800 mb-2">Check your email!</h3>
      <p class="text-gray-500 text-sm mb-1">A verification link was sent to:</p>
      <p class="text-indigo-600 font-medium text-sm mb-4" th:text="${param.email}">your@email.com</p>
      <p class="text-gray-400 text-xs">Click the link in the email to activate your account, then log in.</p>
      <a th:href="@{/login}" class="mt-4 inline-block text-indigo-600 text-sm hover:underline">Back to Login</a>
    </div>

    <div th:if="${param.pending == null}">
    <div th:if="${errorMessage}" class="mb-4 flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span th:text="${errorMessage}">Error</span>
    </div>

    <form th:action="@{/register}" th:object="${registerDTO}" method="post" class="space-y-4">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fa-solid fa-user text-sm"></i></span>
          <input type="text" th:field="*{username}" placeholder="Choose a username"
                 class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fa-solid fa-envelope text-sm"></i></span>
          <input type="email" th:field="*{email}" placeholder="you@example.com"
                 class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fa-solid fa-lock text-sm"></i></span>
          <input type="password" th:field="*{password}" placeholder="Min 6 characters"
                 class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="fa-solid fa-lock text-sm"></i></span>
          <input type="password" th:field="*{confirmPassword}" placeholder="Repeat password"
                 class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
      </div>

      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition text-sm mt-2">
        <i class="fa-solid fa-user-plus mr-2"></i>Create Account
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a th:href="@{/login}" class="text-indigo-600 font-semibold hover:underline">Sign in</a>
    </p>
    </div><!-- end th:if pending==null -->
  </div>
</div>

</body>
</html>
