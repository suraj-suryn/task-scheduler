<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Admin — All Tasks', ~{::main-content})}"
      lang="en">
<head><title>Admin Tasks</title></head>
<body>
<th:block th:fragment="main-content">

  <div class="flex items-center gap-3 mb-6">
    <a th:href="@{/admin}" class="text-indigo-600 hover:text-indigo-800 text-sm"><i class="fa-solid fa-arrow-left mr-1"></i>Admin</a>
    <span class="text-gray-300">/</span>
    <h1 class="text-2xl font-bold text-gray-900">All Tasks</h1>
  </div>

  <!-- Filter bar -->
  <form th:action="@{/admin/tasks}" method="get" class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6 flex flex-wrap gap-3 items-end">
    <div class="flex-1 min-w-40">
      <label class="block text-xs font-medium text-gray-600 mb-1">Search</label>
      <div class="relative">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"><i class="fa-solid fa-magnifying-glass"></i></span>
        <input type="text" name="search" th:value="${search}" placeholder="Search by name..."
               class="w-full pl-8 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
      </div>
    </div>
    <div class="min-w-36">
      <label class="block text-xs font-medium text-gray-600 mb-1">Status</label>
      <select name="status" class="w-full border border-gray-300 rounded-lg text-sm py-2 px-3 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <option value="">All Statuses</option>
        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                th:selected="${selectedStatus != null and selectedStatus == s}">Status</option>
      </select>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
        <i class="fa-solid fa-filter mr-1"></i>Filter
      </button>
      <a th:href="@{/admin/tasks}" class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-medium px-4 py-2 rounded-lg transition">
        <i class="fa-solid fa-xmark"></i>
      </a>
    </div>
  </form>

  <!-- Tasks table -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100">
    <div class="px-5 py-4 border-b border-gray-100">
      <h2 class="font-semibold text-gray-800 text-sm">Tasks
        <span class="ml-2 bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-0.5 rounded-full"
              th:text="${#lists.size(tasks)}">0</span>
      </h2>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm" style="min-width:620px;" th:unless="${#lists.isEmpty(tasks)}">
        <thead class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
          <tr>
            <th class="px-5 py-3 text-left">Task</th>
            <th class="px-4 py-3 text-left">Owner ID</th>
            <th class="px-4 py-3 text-left">Priority</th>
            <th class="px-4 py-3 text-left">End Time</th>
            <th class="px-4 py-3 text-left">Status</th>
            <th class="px-4 py-3 text-left">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr th:each="t : ${tasks}" class="hover:bg-gray-50 transition">
            <td class="px-5 py-3">
              <p class="font-medium text-gray-800" th:text="${t.name}">Task</p>
              <p class="text-xs text-gray-400 truncate max-w-xs" th:if="${t.description}" th:text="${t.description}"></p>
            </td>
            <td class="px-4 py-3 text-gray-400 text-xs" th:text="${t.assignedTo != null ? t.assignedTo : '—'}">-</td>
            <td class="px-4 py-3">
              <span th:text="${t.priority}"
                    th:classappend="${t.priority >= 8 ? 'bg-red-100 text-red-700' : (t.priority >= 5 ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700')}"
                    class="inline-block px-2 py-0.5 rounded-full text-xs font-bold">1</span>
            </td>
            <td class="px-4 py-3 text-xs text-gray-500" th:text="${#temporals.format(t.endTime, 'dd MMM yyyy, HH:mm')}">-</td>
            <td class="px-4 py-3">
              <span th:classappend="'status-' + ${t.status}"
                    class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold"
                    th:text="${t.status}">PENDING</span>
            </td>
            <td class="px-4 py-3">
              <a th:href="@{/admin/tasks/delete/{id}(id=${t.id})}"
                 onclick="return confirm('Delete this task?')"
                 class="text-red-400 hover:text-red-600 transition text-xs font-medium">Delete</a>
            </td>
          </tr>
        </tbody>
      </table>
      <div th:if="${#lists.isEmpty(tasks)}" class="text-center py-12 text-gray-400">
        <i class="fa-solid fa-inbox text-3xl mb-2 block text-gray-200"></i>
        <p class="text-sm">No tasks found.</p>
      </div>
    </div>
  </div>

</th:block>
</body>
</html>
