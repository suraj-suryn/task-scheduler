<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Admin — Users', ~{::main-content})}"
      lang="en">
<head><title>Admin Users</title></head>
<body>
<th:block th:fragment="main-content">

  <div class="flex items-center gap-3 mb-6">
    <a th:href="@{/admin}" class="text-indigo-600 hover:text-indigo-800 text-sm"><i class="fa-solid fa-arrow-left mr-1"></i>Admin</a>
    <span class="text-gray-300">/</span>
    <h1 class="text-2xl font-bold text-gray-900">Users</h1>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100">
    <div class="px-5 py-4 border-b border-gray-100">
      <h2 class="font-semibold text-gray-800 text-sm">All Users
        <span class="ml-2 bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-0.5 rounded-full"
              th:text="${#lists.size(users)}">0</span>
      </h2>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm" style="min-width:700px;">
        <thead class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
          <tr>
            <th class="px-5 py-3 text-left">ID</th>
            <th class="px-4 py-3 text-left">Username</th>
            <th class="px-4 py-3 text-left">Email</th>
            <th class="px-4 py-3 text-left">Role</th>
            <th class="px-4 py-3 text-left">Status</th>
            <th class="px-4 py-3 text-left">Joined</th>
            <th class="px-4 py-3 text-left">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr th:each="u : ${users}" class="hover:bg-gray-50 transition">
            <td class="px-5 py-3 text-gray-400 text-xs" th:text="${u.id}">1</td>
            <td class="px-4 py-3">
              <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full bg-indigo-100 text-indigo-700 text-xs font-bold flex items-center justify-center"
                     th:text="${#strings.toUpperCase(#strings.substring(u.username, 0, 1))}">A</div>
                <span class="font-medium text-gray-800" th:text="${u.username}">username</span>
              </div>
            </td>
            <td class="px-4 py-3 text-gray-500" th:text="${u.email}">email</td>
            <td class="px-4 py-3">
              <form th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post" class="flex items-center gap-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <select name="role" onchange="this.form.submit()"
                        class="border border-gray-200 rounded-lg text-xs px-2 py-1 focus:outline-none focus:ring-1 focus:ring-indigo-400">
                  <option value="ROLE_USER" th:selected="${u.role.name() == 'ROLE_USER'}">USER</option>
                  <option value="ROLE_ADMIN" th:selected="${u.role.name() == 'ROLE_ADMIN'}">ADMIN</option>
                </select>
              </form>
            </td>
            <td class="px-4 py-3">
              <span th:if="${u.enabled}" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">Active</span>
              <span th:unless="${u.enabled}" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700">Disabled</span>
            </td>
            <td class="px-4 py-3 text-xs text-gray-400" th:text="${#temporals.format(u.createdAt, 'dd MMM yyyy')}">Date</td>
            <td class="px-4 py-3">
              <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit"
                        th:class="${u.enabled ? 'text-red-400 hover:text-red-600' : 'text-green-500 hover:text-green-700'} + ' transition text-xs font-medium'"
                        th:text="${u.enabled ? 'Disable' : 'Enable'}">Toggle</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</th:block>
</body>
</html>
