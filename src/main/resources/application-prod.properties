# ============================================================
# PRODUCTION PROFILE — used when SPRING_PROFILES_ACTIVE=prod
# Set all variables marked with ${...} as environment variables
# on your hosting platform (Railway, Render, Fly.io, etc.)
# ============================================================

spring.application.name=task-scheduler

# ----------------------
# SERVER
# ----------------------
server.port=${PORT:8080}

# ----------------------
# POSTGRESQL (Supabase Session Pooler)
# ----------------------
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# ----------------------
# JPA / HIBERNATE
# ----------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ----------------------
# THYMELEAF (enable caching in production)
# ----------------------
spring.thymeleaf.cache=true

# ----------------------
# H2 CONSOLE — DISABLED in production
# ----------------------
spring.h2.console.enabled=false

# ----------------------
# APP BASE URL (used for email verification link)
# ----------------------
app.base-url=https://task-scheduler-production-39cb.up.railway.app

# ----------------------
# LOGGING
# ----------------------
logging.level.com.suraj.scheduler=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

